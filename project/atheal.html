// ─── TIMER ────────────────────────────────────────────────────────────────────
const M={IDLE:"IDLE",RUN:"RUN",PAUSED:"PAUSED",REST:"REST",EX_DONE:"EX_DONE"};
function mkTimer(ex){return{mode:M.IDLE,elapsed:0,set:0,done:0,total:ex.sets,restDur:ex.rest,restLeft:0};}
function timerR(s,a){
  switch(a.t){
    case"START": return{...s,mode:M.RUN};
    case"PAUSE": return{...s,mode:M.PAUSED};
    case"RESUME":return{...s,mode:M.RUN};
    case"TICK":
      if(s.mode===M.RUN) return{...s,elapsed:s.elapsed+1};
      if(s.mode===M.REST){const r=s.restLeft-1;if(r<=0)return{...s,mode:M.IDLE,elapsed:0,restLeft:0};return{...s,restLeft:r};}
      return s;
    case"SKIP":case"DONE":{const n=s.set+1;if(n>=s.total)return{...s,mode:M.EX_DONE,done:s.total,elapsed:0};return{...s,mode:M.REST,done:s.set+1,set:n,restLeft:s.restDur,elapsed:0};}
    case"SKIP_REST":return{...s,mode:M.IDLE,elapsed:0,restLeft:0};
    case"RESET":return mkTimer(a.ex);
    default:return s;
  }
}
function fmt(s){return`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;}

// ─── CUSTOM SVG BAR CHART (replaces Recharts) ─────────────────────────────────
function WeeklyBarChart({data,highlightKey,missedKey}){
  const maxVal=Math.max(...data.map(d=>d.min),1);
  const H=52,barW=30,gap=6,totalW=data.length*(barW+gap)-gap;
  return(
    <svg width="100%" height={H+28} viewBox={`0 0 ${totalW+16} ${H+28}`} preserveAspectRatio="xMidYMid meet" style={{overflow:"visible"}}>
      {data.map((d,i)=>{
        const barH=d.min>0?Math.max((d.min/maxVal)*H,4):3;
        const x=8+i*(barW+gap);
        const isHL=d.day===highlightKey,isMissed=d.day===missedKey;
        const fill=isHL?G:isMissed?"#FCA5A5":d.min>0?"#4ADE80":"#F3F4F6";
        return(
          <g key={i}>
            <rect x={x} y={H-barH} width={barW} height={barH} fill={fill} rx={4}/>
            {isMissed?(
              <>
                <rect x={x-3} y={H+6} width={barW+6} height={16} rx={8} fill="#FFF5F0" stroke={BROWN} strokeWidth={0.8}/>
                <text x={x+barW/2} y={H+17} textAnchor="middle" fontSize={9} fill={BROWN} fontWeight="700">{d.day}</text>
              </>
            ):(
              <text x={x+barW/2} y={H+17} textAnchor="middle" fontSize={10} fill={isHL?"#111827":"#9CA3AF"} fontWeight={isHL?"700":"400"}>{d.day}</text>
            )}
          </g>
        );
      })}
    </svg>
  );
}

      {/* Tabs */}
      <div style={{display:"flex",padding:"12px 16px 0",borderBottom:"1px solid #F3F4F6",overflowX:"auto"}}>
        {t.tabs.map((tab,i)=><div key={i} style={{padding:"9px 14px",fontSize:13,fontWeight:i===0?700:400,color:i===0?G:"#9CA3AF",whiteSpace:"nowrap",cursor:"pointer",borderBottom:i===0?`2.5px solid ${G}`:"2.5px solid transparent"}}>{tab}</div>)}
      </div>
      {/* Streak */}
      <div style={{margin:"16px 16px 0",padding:"14px 16px",borderRadius:14,background:"#FAF7F2",border:"1px solid #EDE8DF",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
            <span style={{background:GL,color:G,fontSize:11,fontWeight:800,padding:"2px 10px",borderRadius:20,border:`1px solid ${GBD}`}}>{t.activeBadge}</span>
            <span style={{fontSize:11,color:"#9CA3AF",fontWeight:700}}>{t.thisWeek}</span>
          </div>
          <div style={{fontSize:13,color:"#374151"}}>{t.weeklyGoal}</div>
        </div>
        <CircArc value={5} max={7} size={64} sub={t.days}/>
      </div>
      {/* Week strip */}
      <WeekStrip days={planDays} selected={selectedDay} lang={lang} onSelect={setSelectedDay}/>
      {/* Content */}
      {isRest?(
        <div style={{padding:"24px 16px 0"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:28}}>
            <div>
              <div style={{fontSize:11,fontWeight:800,color:G,letterSpacing:1.2,marginBottom:6}}>{t.restDayLabel}</div>
              <div style={{fontSize:28,fontWeight:800,letterSpacing:-0.5,lineHeight:1.2}}>{t.noActivityTitle}</div>
            </div>
            <div style={{width:56,height:56,borderRadius:"50%",border:`2px solid ${BROWN}`,background:"#FFF5F0",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:4}}>
              <svg width={30} height={30} viewBox="0 0 24 24" fill="none" stroke={BROWN} strokeWidth={1.8} strokeLinecap="round" strokeLinejoin="round">
                <circle cx="12" cy="4.5" r="2.5"/><path d="M12 7v5"/><path d="M8.5 10.5l3.5 1.5 3.5-1.5"/><path d="M10 13l-2 5"/><path d="M14 13l2 5"/>
              </svg>
            </div>
          </div>
          <WhySection t={t} whyKey={whyKey}/><TipSection t={t}/><ExpertCard t={t}/>
        </div>
      ):(
        <>
          <div style={{padding:"22px 16px 0"}}>
            <div style={{fontSize:11,fontWeight:800,color:G,letterSpacing:1.2,marginBottom:4}}>{sectionLabel}</div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,gap:12}}>
              <div style={{flex:1}}>
                <div style={{fontSize:22,fontWeight:800,lineHeight:1.2}}>{sessName}</div>
                <div style={{fontSize:13,color:"#6B7280",marginTop:4}}>{sessMeta}</div>
              </div>
              <CircArc value={gaugeVal} max={50} size={66} sub={"/50 min"}/>
            </div>
          </div>
          <div style={{borderTop:"1px solid #F3F4F6"}}>
            {exercises.slice(0,5).map((ex,i)=><ExRow key={i} ex={ex} lang={lang} arrow={arrow} circular={isPast} onClick={()=>onStartAtExercise(i,day)}/>)}
            <div style={{padding:"12px 16px",textAlign:"center",color:G,fontSize:14,fontWeight:700,cursor:"pointer"}}>{t.moreEx}</div>
          </div>
          <div style={{padding:"8px 16px 4px"}}>
            <button onClick={btnGray?undefined:onStart} style={{width:"100%",padding:17,borderRadius:14,fontSize:16,fontWeight:800,background:btnGray?"#94A3B8":G,border:"none",color:"white",cursor:btnGray?"not-allowed":"pointer",opacity:btnGray?0.7:1,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
              {btnLabel}{!btnGray&&<span>{arrow}</span>}
            </button>
          </div>
          {btnGray&&<div style={{padding:"8px 16px",display:"flex",alignItems:"center",gap:6}}>
            <div style={{width:18,height:18,borderRadius:"50%",background:"#DBEAFE",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><span style={{fontSize:11,fontWeight:800,color:"#2563EB"}}>i</span></div>
            <span style={{fontSize:13,color:"#2563EB",fontWeight:600}}>{t.sessionTomorrow}</span>
          </div>}
          <WhySection t={t} whyKey={whyKey}/><TipSection t={t}/><ExpertCard t={t}/>
        </>
      )}
    </div>
  );
}

// ─── SESSION VIEW ─────────────────────────────────────────────────────────────
function SessionView({t,lang,exIdx,setExIdx,exercises,onComplete,addSecs,onBack}){
  const EX=exercises||EX_LOWER,ex=EX[exIdx];
  const [timer,dispatch]=useReducer(timerR,null,()=>mkTimer(ex));
  const modeRef=useRef(timer.mode);
  const [totalMin,setTotalMin]=useState(0);
  useEffect(()=>{modeRef.current=timer.mode;},[timer.mode]);
  useEffect(()=>{dispatch({t:"RESET",ex});},[exIdx]);
  useEffect(()=>{const id=setInterval(()=>{dispatch({t:"TICK"});if(modeRef.current===M.RUN)addSecs(1);},1000);return()=>clearInterval(id);},[]);
  useEffect(()=>{if(timer.mode!==M.RUN)return;const id=setInterval(()=>setTotalMin(m=>m+1),60000);return()=>clearInterval(id);},[timer.mode]);
  const arrow=lang==="ar"?"←":"→";
  const isRest=timer.mode===M.REST,isDone=timer.mode===M.EX_DONE,isPaused=timer.mode===M.PAUSED,isIdle=timer.mode===M.IDLE;
  return(
    <div style={{background:"white",minHeight:"100%",paddingBottom:32}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 16px 0"}}>
        <button onClick={onBack} style={{background:"none",border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:5,color:"#374151",padding:0}}>
          <Chev dir={lang==="ar"?"right":"left"} color="#374151"/><span style={{fontSize:15,fontWeight:600}}>{lang==="ar"?ex.ar:ex.en}</span>
        </button>
        <div style={{textAlign:lang==="ar"?"left":"right"}}><div style={{fontSize:11,color:"#9CA3AF"}}>{t.inSession}</div><div style={{fontSize:14,fontWeight:800}}>{exIdx+1}/{EX.length} {t.sessions}</div></div>
      </div>
      <div style={{padding:"16px 16px 0",display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12}}>
        <div style={{flex:1}}>
          <h2 style={{fontSize:26,fontWeight:900,margin:"0 0 5px",letterSpacing:-0.5}}>{lang==="ar"?ex.ar:ex.en}</h2>
          <div style={{fontSize:13,color:"#6B7280",marginBottom:8}}>{ex.sets} {t.setsUnit} × {ex.reps} {t.repsUnit}, RPE 7, {ex.rest} {t.restUnit}</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{ex.tags.map(tg=><Tag key={tg} label={tg}/>)}</div>
        </div>
        <CircArc value={totalMin} max={15} size={72} sub={t.minOf}/>
      </div>
      <div style={{margin:"16px 0",height:220,background:"#F8FAFB",display:"flex",alignItems:"center",justifyContent:"center",position:"relative",overflow:"hidden"}}>
        <img src={ex.img} alt={ex.en} style={{maxHeight:"100%",maxWidth:"100%",objectFit:"contain"}}/>
        <button style={{position:"absolute",width:52,height:52,borderRadius:"50%",background:"rgba(255,255,255,0.92)",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 3px 12px rgba(0,0,0,0.14)"}}>
          <svg width={22} height={22} viewBox="0 0 24 24" fill={G}><polygon points="5,3 19,12 5,21"/></svg>
        </button>
      </div>
      <div style={{textAlign:"center",padding:"6px 16px 0"}}>
        <div style={{fontSize:11,fontWeight:800,color:"#9CA3AF",letterSpacing:2,marginBottom:4}}>{isRest?t.restTimerLabel:t.exTimerLabel}</div>
        <div style={{fontSize:68,fontWeight:900,letterSpacing:-3,lineHeight:1,fontVariantNumeric:"tabular-nums",color:"#111827"}}>{fmt(isRest?timer.restLeft:timer.elapsed)}</div>
        {isRest&&<div style={{fontSize:12,color:"#9CA3AF",marginTop:5}}>{t.restHint}</div>}
        {!isIdle&&!isDone&&!isRest&&<div style={{fontSize:12,color:"#9CA3AF",marginTop:5}}>{t.pauseHint}</div>}
      </div>
      {!isDone&&<div style={{display:"flex",justifyContent:"center",gap:18,padding:"18px 16px 0"}}>{Array.from({length:ex.sets}).map((_,i)=>{const st=i<timer.done?"done":i===timer.set?"active":"pending";return<SetDot key={i} status={st} label={`${t.setLabel} ${i+1}`}/>;})}</div>}
      <div style={{padding:"16px 16px 8px"}}>
        {isDone?(
          <button onClick={()=>{if(exIdx+1>=EX.length)onComplete();else setExIdx(exIdx+1);}} style={{width:"100%",padding:17,borderRadius:14,background:G,border:"none",color:"white",fontSize:16,fontWeight:800,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>{t.moveNextBtn} {arrow}</button>
        ):isIdle?(
          <><button onClick={()=>dispatch({t:"START"})} style={{width:"100%",padding:17,borderRadius:14,background:G,border:"none",color:"white",fontSize:16,fontWeight:800,cursor:"pointer",marginBottom:10}}>{t.startNow}</button><div style={{textAlign:"center"}}><button onClick={()=>dispatch({t:"DONE"})} style={{background:"none",border:"none",color:"#374151",fontSize:14,cursor:"pointer",textDecoration:"underline"}}>{t.completeManually}</button></div></>
        ):isRest?(
          <button onClick={()=>dispatch({t:"SKIP_REST"})} style={{width:"100%",padding:17,borderRadius:14,background:"transparent",border:`2px solid ${G}`,color:G,fontSize:16,fontWeight:800,cursor:"pointer"}}>{t.skipBtn}</button>
        ):(
          <div style={{display:"flex",gap:12}}>
            <button onClick={()=>dispatch({t:isPaused?"RESUME":"PAUSE"})} style={{flex:1,padding:17,borderRadius:14,fontSize:16,fontWeight:800,cursor:"pointer",background:isPaused?G:"transparent",border:`2px solid ${G}`,color:isPaused?"white":G}}>{isPaused?t.resumeBtn:t.pauseBtn}</button>
            <button onClick={()=>dispatch({t:"SKIP"})} style={{flex:"0 0 auto",padding:"17px 28px",borderRadius:14,background:"transparent",border:"2px solid #E5E7EB",color:"#374151",fontSize:16,fontWeight:800,cursor:"pointer"}}>{t.skipBtn}</button>
          </div>
        )}
      </div>
      <div style={{margin:"6px 16px 0",padding:16,borderRadius:12,background:"#FFFBF0",border:"1px solid #FDE68A"}}>
        <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:7}}><div style={{width:19,height:19,borderRadius:"50%",background:"#FEF3C7",border:"2px solid #F59E0B",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,color:"#92400E",flexShrink:0}}>?</div><span style={{fontSize:13,fontWeight:700,color:"#92400E"}}>{t.whyLiftTitle}</span></div>
        <p style={{fontSize:13,color:"#374151",lineHeight:1.65,margin:0}}>{lang==="ar"?ex.whyAr:ex.whyEn}</p>
      </div>
      {exIdx<EX.length-1&&<div style={{padding:"16px 0 0"}}><div style={{fontSize:11,fontWeight:800,color:"#9CA3AF",letterSpacing:1.2,padding:"0 16px",marginBottom:8}}>{t.upNextLabel}</div>{EX.slice(exIdx+1,exIdx+3).map((nx,i)=><ExRow key={i} ex={nx} lang={lang} arrow={arrow} showBorder={i===0} onClick={()=>setExIdx(exIdx+1+i)}/>)}</div>}
    </div>
  );
}

// ─── COMPLETE VIEW ────────────────────────────────────────────────────────────
function CompleteView({t,lang,onLangToggle,dayNum,minutes,onBack}){
  const weekly=lang==="ar"?WEEKLY_AR:WEEKLY_EN;
  const dayKeys={en:["MON","TUE","WED","THU","FRI","SAT","SUN"],ar:["إثنين","ثلاثاء","أربعاء","خميس","جمعة","سبت","أحد"]};
  const keys=lang==="ar"?dayKeys.ar:dayKeys.en;
  const hlKey=keys[(dayNum||5)-1]||(lang==="ar"?"جمعة":"FRI");
  const missedKey=lang==="ar"?"أربعاء":"WED";
  return(
    <div style={{background:"white",minHeight:"100%",paddingBottom:32}}>
      <div style={{background:`linear-gradient(150deg,${G} 0%,${GM} 100%)`,padding:"36px 24px 28px",textAlign:"center",color:"white",position:"relative"}}>
        <button onClick={onBack} style={{position:"absolute",top:16,left:lang==="ar"?"auto":16,right:lang==="ar"?16:"auto",background:"none",border:"none",color:"white",cursor:"pointer",padding:4}}>
          <svg width={22} height={22} viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth={2.5} strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
        <button onClick={onLangToggle} style={{position:"absolute",top:14,right:lang==="ar"?"auto":16,left:lang==="ar"?16:"auto",background:"rgba(255,255,255,0.15)",border:"1.5px solid rgba(255,255,255,0.5)",borderRadius:20,padding:"4px 12px",fontSize:13,fontWeight:700,color:"white",cursor:"pointer"}}>{t.switchLang}</button>
        <div style={{fontSize:52,marginBottom:8}}>🏆</div>
        <h1 style={{fontSize:30,fontWeight:900,margin:"0 0 6px"}}>Day {dayNum} Done!</h1>
        <p style={{fontSize:14,opacity:0.8,margin:"0 0 24px"}}>{t.sessionComplete}</p>
        <div style={{display:"flex",justifyContent:"center",gap:36}}>
          {[[minutes||52,t.minutesLabel],["5/5",t.exercisesLabel],["7",t.streakLabel]].map(([v,l],i)=><div key={i} style={{textAlign:"center"}}><div style={{fontSize:30,fontWeight:900}}>{v}</div><div style={{fontSize:12,opacity:0.7,marginTop:2}}>{l}</div></div>)}
        </div>
      </div>
      <div style={{padding:"22px 16px 0"}}>
        <div style={{fontSize:11,fontWeight:800,color:"#9CA3AF",letterSpacing:1.2,marginBottom:14}}>{t.weeklyLabel}</div>
        <WeeklyBarChart data={weekly} highlightKey={hlKey} missedKey={missedKey}/>
      </div>
      <div style={{margin:"16px 16px 0",padding:18,borderRadius:14,background:"#EFF6FF",border:"1px solid #BFDBFE"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}><div style={{width:36,height:36,borderRadius:"50%",background:"#DBEAFE",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><svg width={18} height={18} viewBox="0 0 24 24" fill="#2563EB"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></div><span style={{fontSize:11,fontWeight:800,color:"#1D4ED8",letterSpacing:1}}>{t.healthLabel}</span></div>
        <div style={{fontSize:16,fontWeight:700,marginBottom:6,lineHeight:1.4,color:"#1E3A5F"}}>{t.healthTitle}</div>
        <div style={{fontSize:13,color:"#6B7280",lineHeight:1.5}}>{t.healthSub}</div>
      </div>
      {[[t.nextSessCard,t.nextSessName,t.nextSessMeta,IMG_THUMB_PUSH_UP],[t.labLabel,t.labTime,t.labSub,null]].map(([label,name,meta,img],i)=>(
        <div key={i} style={{margin:"12px 16px 0",padding:"14px 16px",borderRadius:14,background:i===1?"#FFFBF0":"#F9FAFB",border:i===1?"1px solid #FDE68A":"1px solid #E5E7EB",display:"flex",alignItems:"center",gap:12}}>
          {img?<div style={{width:44,height:44,borderRadius:"50%",border:`2px solid ${G}`,overflow:"hidden",background:"white",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}><img src={img} alt="" style={{width:"80%",height:"80%",objectFit:"contain"}}/></div>:<div style={{width:44,height:44,borderRadius:"50%",background:"#FEF9C3",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><svg width={22} height={22} viewBox="0 0 24 24" fill="none" stroke="#CA8A04" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"><path d="M9 3h6m-3 0v3m-5 2l10 0M5 8l1.5 12h11L19 8"/></svg></div>}
          <div style={{flex:1}}><div style={{fontSize:10,fontWeight:800,color:"#9CA3AF",letterSpacing:1.2,marginBottom:5}}>{label}</div><div style={{fontSize:17,fontWeight:800,marginBottom:3}}>{name}</div><div style={{fontSize:13,color:"#6B7280",lineHeight:1.4}}>{meta}</div></div>
          <Chev dir={lang==="ar"?"left":"right"} color={G}/>
        </div>
      ))}
      <div style={{marginTop:16}}><ExpertCard t={t}/></div>
    </div>
  );
}

// ─── BOTTOM NAV ───────────────────────────────────────────────────────────────
function BottomNav({t,active}){
  const items=[{key:"overview",label:t.overview,d:"M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"},{key:"plan",label:t.plan,d:"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"},{key:"report",label:t.report,d:"M18 20V10M12 20V4M6 20v-6"},{key:"profile",label:t.profile,d:"M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2M12 11a4 4 0 100-8 4 4 0 000 8z"}];
  return(
    <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"min(393px,100vw)",background:"white",borderTop:"1px solid #F3F4F6",display:"flex",justifyContent:"space-around",padding:"10px 0 18px",zIndex:100}}>
      {items.map(item=>(
        <div key={item.key} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,cursor:"pointer",color:item.key===active?G:"#9CA3AF"}}>
          <svg width={22} height={22} viewBox="0 0 24 24" fill="none" stroke={item.key===active?G:"#9CA3AF"} strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"><path d={item.d}/></svg>
          <span style={{fontSize:11,fontWeight:item.key===active?700:400}}>{item.label}</span>
        </div>
      ))}
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App(){
  const [lang,setLang]=useState("en");
  const [view,setView]=useState("plan");
  const [planStatus,setPlanStatus]=useState("start");
  const [selectedPlanDay,setSelectedPlanDay]=useState(4);
  const [exIdx,setExIdx]=useState(0);
  const [sessionExercises,setSessionEx]=useState(EX_LOWER);
  const [totalSecs,setTotalSecs]=useState(0);
  const [compDayNum,setCompDayNum]=useState(5);
  const [compMin,setCompMin]=useState(52);
  const t=TR[lang],isRTL=lang==="ar";
  const toggleLang=()=>setLang(l=>l==="en"?"ar":"en");
  const handleStartAtExercise=(idx,day)=>{
    setSessionEx(day?.exercises||EX_LOWER);
    setExIdx(idx);
    if(planStatus!=="done")setPlanStatus("resume");
    setView("session");
  };
  const handleStart=()=>{
    if(planStatus==="done"){const pd=getPlanDays(planStatus),d=pd[selectedPlanDay];setCompDayNum(d.dayNum);setCompMin(d.completedMin||52);setView("complete");return;}
    const pd=getPlanDays(planStatus),d=pd[selectedPlanDay];
    setSessionEx(d.exercises||EX_LOWER);setExIdx(0);setTotalSecs(0);setPlanStatus("resume");setView("session");
  };
  const handleComplete=()=>{
    const pd=getPlanDays("done");setCompDayNum(pd[4].dayNum);setCompMin(Math.floor(totalSecs/60)||52);
    setPlanStatus("done");setSelectedPlanDay(5);setView("complete");
  };
  return(
    <div dir={isRTL?"rtl":"ltr"} style={{fontFamily:isRTL?"'Noto Sans Arabic','Segoe UI',sans-serif":"'Inter','Segoe UI',system-ui,sans-serif",maxWidth:393,margin:"0 auto",background:"#F5F5F5",minHeight:"100vh"}}>
      <div style={{background:"white",minHeight:"100vh",overflowY:"auto",paddingBottom:view==="plan"?72:0}}>
        {view==="plan"&&<PlanView t={t} lang={lang} onLangToggle={toggleLang} planStatus={planStatus} onStart={handleStart} onStartAtExercise={handleStartAtExercise} selectedDay={selectedPlanDay} setSelectedDay={setSelectedPlanDay}/>}
        {view==="session"&&<SessionView t={t} lang={lang} exIdx={exIdx} setExIdx={setExIdx} exercises={sessionExercises} onComplete={handleComplete} addSecs={n=>setTotalSecs(p=>p+n)} onBack={()=>setView("plan")}/>}
        {view==="complete"&&<CompleteView t={t} lang={lang} onLangToggle={toggleLang} dayNum={compDayNum} minutes={compMin} onBack={()=>setView("plan")}/>}
      </div>
      {view==="plan"&&<BottomNav t={t} active="plan"/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
